<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ER MPH Nurse Note 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    margin:0;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    min-height:100vh;
    padding:20px;
    color:#222;
}

.container{
    max-width:1400px;
    margin:auto;
}

.header{
    background:white;
    border-radius:25px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    margin-bottom:20px;
}

.logo{
    font-size:60px;
}

.title{
    font-size:38px;
    font-weight:700;
    color:#0072ff;
}

.subtitle{
    color:#666;
    margin-top:5px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card h2{
    margin-top:0;
    color:#0072ff;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

input,select,textarea{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:2px solid #ddd;
    font-size:15px;
}

textarea{
    min-height:100px;
}

button{
    background:#0072ff;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    margin-top:10px;
}

button:hover{
    background:#0056cc;
}

.summary{
    background:#111827;
    color:#00ff9d;
    border-radius:20px;
    padding:20px;
    white-space:pre-wrap;
    min-height:300px;
    font-size:14px;
}

.flex{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.small-btn{
    padding:8px 12px;
    font-size:13px;
    background:#00b894;
}

.danger{
    background:#ff4d4d;
}

.badge{
    display:inline-block;
    background:#0072ff;
    color:white;
    padding:5px 12px;
    border-radius:20px;
    margin-bottom:10px;
}

.footer{
    text-align:center;
    color:white;
    margin-top:20px;
    font-weight:600;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">🏥</div>
<div class="title">ER MPH Nurse Note 2026</div>
<div class="subtitle">Emergency Room Nursing Documentation System</div>
</div>

<!-- PATIENT -->
<div class="card">
<h2>📋 Patient Information</h2>

<div class="grid">
<div>
<label>HN</label>
<input type="text" id="hn">
</div>

<div>
<label>อายุ</label>
<input type="number" id="age">
</div>

<div>
<label>เพศ</label>
<select id="gender">
<option>ชาย</option>
<option>หญิง</option>
<option>LGBTQ+</option>
</select>
</div>

<div>
<label>วันที่</label>
<div class="flex">
<input type="date" id="date">
<button onclick="setToday()">Today</button>
</div>
</div>

<div>
<label>Visit ER</label>
<div class="flex">
<input type="time" id="visitTime">
<button onclick="setNow('visitTime')">Now</button>
</div>
</div>

<div>
<label>First ER Triage</label>
<div class="flex">
<input type="time" id="triageTime">
<button onclick="setNow('triageTime')">Now</button>
</div>
</div>
</div>
</div>

<!-- VITAL SIGNS -->
<div class="card">
<h2>📚 Vital Signs</h2>

<div class="grid">

<input type="number" placeholder="BT °C" id="bt">
<input type="number" placeholder="RR" id="rr">
<input type="number" placeholder="HR" id="hr">
<input type="number" placeholder="BP SYS" id="bpsys">
<input type="number" placeholder="BP DIA" id="bpdia">
<input type="number" placeholder="SpO2 %" id="spo2">

<select id="oxygen">
<option value="no">ไม่ใช้ O2</option>
<option value="yes">ใช้ออกซิเจน</option>
</select>

<select id="avpu">
<option value="A">A</option>
<option value="V">V</option>
<option value="P">P</option>
<option value="U">U</option>
</select>

</div>

<br>

<div class="flex">
<button onclick="calculateScores()">คำนวณ SIRS / NEWS2</button>
<button class="danger" onclick="clearVitals()">Clear</button>
</div>

<br>

<div id="scoreResult"></div>

</div>

<!-- TRIAGE -->
<div class="card">
<h2>👩🏼‍⚕️ Nurse Triage</h2>

<textarea id="nurseTriage"></textarea>

<div class="flex">
<input type="time" id="nurseTriageTime">
<button onclick="setNow('nurseTriageTime')">Now</button>
</div>

<br>

<label>🆘 ESI Level</label>
<select id="esi">
<option>ESI 1</option>
<option>ESI 2</option>
<option>ESI 3</option>
<option>ESI 4</option>
<option>ESI 5</option>
</select>

</div>

<!-- PRIMARY SURVEY -->
<div class="card">
<h2>🚨 Primary Survey</h2>

<div id="primarySurvey"></div>

</div>

<!-- NOTE -->
<div class="card">
<h2>📝 Assessment Record</h2>

<textarea id="assessment"></textarea>

<div class="flex">
<button onclick="addAssessment()">บันทึก</button>
</div>

</div>

<!-- ALARM -->
<div class="card">
<h2>🚨 Alarm Record</h2>

<textarea id="alarm"></textarea>

<div class="flex">
<button onclick="addAlarm()">บันทึก Alarm</button>
</div>

</div>

<!-- SUMMARY -->
<div class="card">
<h2>📄 Summary Record</h2>

<div class="flex">
<button onclick="generateSummary()">Generate Summary</button>
<button onclick="copySummary()">Copy</button>
</div>

<br>

<div class="summary" id="summary"></div>
</div>

<div class="footer">
By Bunchai Juntama ENP 2026
</div>

</div>

<script>

const summary = document.getElementById("summary");

function setToday(){
    document.getElementById("date").value =
    new Date().toISOString().split('T')[0];
}

function setNow(id){
    const now = new Date();
    document.getElementById(id).value =
    now.toTimeString().slice(0,5);
}

function calculateScores(){

    let temp = parseFloat(document.getElementById("bt").value)||0;
    let rr = parseFloat(document.getElementById("rr").value)||0;
    let hr = parseFloat(document.getElementById("hr").value)||0;
    let sys = parseFloat(document.getElementById("bpsys").value)||0;
    let spo2 = parseFloat(document.getElementById("spo2").value)||0;

    let sirs = 0;
    if(temp > 38 || temp < 36) sirs++;
    if(hr > 90) sirs++;
    if(rr > 20) sirs++;

    let news = 0;

    if(rr >=25) news+=3;
    else if(rr >=21) news+=2;
    else if(rr <=8) news+=3;

    if(spo2 <=91) news+=3;
    else if(spo2 <=93) news+=2;
    else if(spo2 <=95) news+=1;

    if(sys <=90) news+=3;
    else if(sys <=100) news+=2;

    if(hr >=131 || hr <=40) news+=3;
    else if(hr >=111) news+=2;
    else if(hr >=91) news+=1;

    document.getElementById("scoreResult").innerHTML =
    `
    <div class="badge">SIRS = ${sirs}</div>
    <div class="badge">NEWS2 = ${news}</div>
    `;
}

function clearVitals(){
    ['bt','rr','hr','bpsys','bpdia','spo2']
    .forEach(id=>document.getElementById(id).value='');

    document.getElementById("scoreResult").innerHTML='';
}

function addAssessment(){
    const txt = document.getElementById("assessment").value;

    if(txt.trim()!==""){
        summary.innerHTML +=
        `[${new Date().toLocaleTimeString()}] Assessment : ${txt}\n`;

        document.getElementById("assessment").value='';
    }
}

function addAlarm(){
    const txt = document.getElementById("alarm").value;

    if(txt.trim()!==""){
        summary.innerHTML +=
        `[${new Date().toLocaleTimeString()}] Alarm : ${txt}\n`;

        document.getElementById("alarm").value='';
    }
}

function generateSummary(){

    const hn = document.getElementById("hn").value;
    const age = document.getElementById("age").value;
    const gender = document.getElementById("gender").value;

    summary.innerHTML += `
==============================
ER MPH NURSE NOTE 2026
==============================
HN : ${hn}
Age : ${age}
Gender : ${gender}

Generated : ${new Date().toLocaleString()}

`;
}

function copySummary(){

    navigator.clipboard.writeText(summary.innerText);

    alert("Copied Summary");
}

function createPrimarySurvey(){

    const items = [
        "Airway",
        "Breathing",
        "Circulation",
        "Disability"
    ];

    let html='';

    items.forEach(item=>{

        html += `
        <div class="card" style="background:#f4f9ff;">
            <h3>${item}</h3>

            <select>
                <option>Pass</option>
                <option>Not pass</option>
            </select>

            <textarea placeholder="รายละเอียด"></textarea>

            <div class="flex">
                <input type="time">
                <button onclick="this.previousElementSibling.value=new Date().toTimeString().slice(0,5)">
                Now
                </button>
            </div>
        </div>
        `;
    });

    document.getElementById("primarySurvey").innerHTML = html;
}

createPrimarySurvey();
setToday();

</script>

</body>
</html>
